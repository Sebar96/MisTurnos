<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="clock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7D2FE"/>
      <stop offset="100%" stop-color="#E9D5FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <clipPath id="rounded">
      <rect x="0" y="0" width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background with rounded corners -->
  <g clip-path="url(#rounded)">
    <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  </g>

  <!-- Calendar body -->
  <rect x="110" y="168" width="292" height="256" rx="32" ry="32" fill="white" opacity="0.95" filter="url(#shadow)"/>

  <!-- Calendar header bar -->
  <rect x="110" y="168" width="292" height="64" rx="32" ry="32" fill="#E0E7FF"/>
  <rect x="110" y="200" width="292" height="32" fill="#E0E7FF"/>

  <!-- Calendar rings -->
  <rect x="170" y="148" width="16" height="52" rx="8" ry="8" fill="#6366F1"/>
  <rect x="248" y="148" width="16" height="52" rx="8" ry="8" fill="#8B5CF6"/>
  <rect x="326" y="148" width="16" height="52" rx="8" ry="8" fill="#6366F1"/>

  <!-- Calendar grid dots -->
  <circle cx="170" cy="280" r="8" fill="#CBD5E1" opacity="0.5"/>
  <circle cx="220" cy="280" r="8" fill="#CBD5E1" opacity="0.5"/>
  <circle cx="270" cy="280" r="8" fill="#CBD5E1" opacity="0.5"/>
  <circle cx="320" cy="280" r="8" fill="#CBD5E1" opacity="0.5"/>

  <circle cx="170" cy="320" r="8" fill="#CBD5E1" opacity="0.5"/>
  <circle cx="220" cy="320" r="8" fill="#CBD5E1" opacity="0.5"/>
  <circle cx="270" cy="320" r="8" fill="#CBD5E1" opacity="0.5"/>
  <circle cx="320" cy="320" r="8" fill="#CBD5E1" opacity="0.5"/>

  <!-- Highlighted date (active appointment) -->
  <circle cx="220" cy="360" r="12" fill="url(#bg)"/>
  <circle cx="320" cy="360" r="12" fill="#C7D2FE"/>

  <!-- Clock overlay (bottom-right) -->
  <g transform="translate(356, 356)">
    <circle cx="0" cy="0" r="64" fill="url(#bg)" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="52" fill="white" opacity="0.95"/>

    <!-- Clock hour markers -->
    <line x1="0" y1="-44" x2="0" y2="-36" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
    <line x1="44" y1="0" x2="36" y2="0" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="44" x2="0" y2="36" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
    <line x1="-44" y1="0" x2="-36" y2="0" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>

    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0" y2="-28" stroke="#4F46E5" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="16" y2="-8" stroke="#7C3AED" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Clock center dot -->
    <circle cx="0" cy="0" r="5" fill="url(#bg)"/>
  </g>
</svg>